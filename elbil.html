<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elbil Kalkulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Elbil Kalkulator</h1>

<label>Forbruk (kWh per 100 km)</label>
<input type="number" id="forbruk100" step="0.1">

<label>Avstand (km)</label>
<input type="number" id="avstand" step="0.1">

<label>Pris på strøm (kr per kWh)</label>
<input type="number" id="pris" step="0.01">

<label>Fortjeneste (kr) [valgfritt]</label>
<input type="number" id="fortjeneste" step="1" value="0">

<button id="beregnBtn">Beregn</button>

<div class="resultat">
<p>kWh per km: <span id="kWhKm">0</span></p>
<p>Total energi brukt: <span id="energiBrukt">0</span> kWh</p>
<p>Strømkostnad: <span id="strømPris">0</span> kr</p>
<p>Sluttpris: <span id="sluttPris">0</span> kr</p>
</div>

<!-- Navigasjonsknapper -->
<div class="navigasjon">
    <button onclick="window.location.href='index.html'" class="nav-btn"> Tilbake til meny</button>
    <button onclick="window.location.href='firma.html'" class="nav-btn"> Bruk Firma kalkulator</button>
</div>

</div>

<script src="elbil.js"></script>
</body>
</html>
