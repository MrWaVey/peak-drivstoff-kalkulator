<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firma Drivstoff Kalkulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Firma Drivstoff Kalkulator</h1>

<label>Forbruk (liter per 100 km)</label>
<input type="number" id="forbruk100" step="0.1">

<label>Avstand (km)</label>
<input type="number" id="avstand" step="0.1">

<label>Pris på drivstoff (kr per liter)</label>
<input type="number" id="pris" step="0.01">

<label>Fortjeneste (kr)</label>
<input type="number" id="fortjeneste" step="1">

<label>Antall personer i bilen</label>
<input type="number" id="antallPersoner" step="1" value="1" min="1">

<button id="beregnBtn">Beregn</button>

<div class="resultat">
<p>Liter per km: <span id="lpkm">0</span></p>
<p>Total drivstoff brukt: <span id="drivstoff">0</span> liter</p>
<p>Drivstoffkostnad: <span id="drivstoffPris">0</span> kr</p>
<p>Sluttpris: <span id="sluttPris">0</span> kr</p>
<p>Pris per person: <span id="prisPerPerson">0</span> kr</p>
</div>

<!-- Navigasjonsknapper -->
<div class="navigasjon">
    <button onclick="window.location.href='index.html'" class="nav-btn">⏪ Tilbake til meny</button>
    <button onclick="window.location.href='elbil.html'" class="nav-btn">⚡ Bruk Elbil kalkulator</button>
</div>

</div>

<script src="firma.js"></script>
</body>
</html>
