<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drivstoff Kalkulator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Drivstoff Kalkulator</h1>

<label>Forbruk (liter per 100 km)</label>
<input type="number" id="forbruk100" step="0.1">

<label>Avstand (km)</label>
<input type="number" id="avstand" step="0.1">

<label>Pris på drivstoff (kr per liter)</label>
<input type="number" id="pris" step="0.01">

<button onclick="beregn()">Beregn</button>

<div class="resultat">

<p>Liter per km: <span id="lpkm">0</span></p>

<p>Total drivstoff brukt:  
<span id="drivstoff">0</span> liter</p>

<p>Total pris:  
<span id="totalPris">0</span> kr</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
