<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privat Drivstoff Kalkulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Privat Drivstoff Kalkulator</h1>

<label>Forbruk (liter per 100 km)</label>
<input type="number" id="forbruk100" step="0.1">

<label>Avstand (km)</label>
<input type="number" id="avstand" step="0.1">

<label>Pris på drivstoff (kr per liter)</label>
<input type="number" id="pris" step="0.01">

<button id="beregnBtn">Beregn</button>

<div class="resultat">
<p>Liter per km: <span id="lpkm">0</span></p>
<p>Total drivstoff brukt: <span id="drivstoff">0</span> liter</p>
<p>Total pris: <span id="totalPris">0</span> kr</p>
</div>

<!-- Navigasjon -->
<div class="navigasjon">
    <button onclick="window.location.href='index.html'" class="nav-btn"> Tilbake til meny</button>
    <button onclick="window.location.href='elbil.html'" class="nav-btn"> Bruk Elbil kalkulator</button>
</div>

</div>

<!-- Koble til ekstern JS-fil -->
<script src="privat.js"></script>

</body>
</html>
